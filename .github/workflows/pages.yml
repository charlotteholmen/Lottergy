name: Deploy data to Pages

# Publishes the contents of `data/` as the GitHub Pages site so that
# `data/v1/<game>.json` becomes `https://thebitmaptoshi.github.io/Lottergy/v1/<game>.json`.
#
# REQUIRES: Repo Settings → Pages → Source = "GitHub Actions" (not "Deploy from a branch").

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: data

      - id: deployment
        uses: actions/deploy-pages@v4
